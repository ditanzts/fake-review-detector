<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deteksi Ulasan Kafe Jember</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5F0E8;
      --brown-dark: #2C1810;
      --brown-mid: #6B3E26;
      --brown-light: #C4956A;
      --accent: #E8A87C;
      --green: #4A7C59;
      --white: #FEFCF8;
    }

    body {
      background-color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(196,149,106,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(74,124,89,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(107,62,38,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating coffee beans decoration */
    .bean {
      position: fixed;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0.06;
      animation: float linear infinite;
    }
    .bean:nth-child(1) { width: 60px; height: 36px; background: var(--brown-dark); top: 10%; left: 8%; animation-duration: 18s; animation-delay: 0s; }
    .bean:nth-child(2) { width: 40px; height: 24px; background: var(--brown-mid); top: 60%; left: 90%; animation-duration: 22s; animation-delay: -5s; }
    .bean:nth-child(3) { width: 80px; height: 48px; background: var(--brown-light); top: 80%; left: 15%; animation-duration: 26s; animation-delay: -10s; }
    .bean:nth-child(4) { width: 50px; height: 30px; background: var(--brown-dark); top: 30%; left: 85%; animation-duration: 20s; animation-delay: -8s; }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      33% { transform: translateY(-20px) rotate(120deg); }
      66% { transform: translateY(10px) rotate(240deg); }
      100% { transform: translateY(0px) rotate(360deg); }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border-radius: 24px;
      padding: 56px 52px;
      width: 100%;
      max-width: 520px;
      box-shadow:
        0 4px 6px rgba(44,24,16,0.04),
        0 20px 60px rgba(44,24,16,0.12),
        0 1px 0 rgba(255,255,255,0.8) inset;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo area */
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--brown-mid), var(--brown-dark));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(107,62,38,0.3);
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: var(--white);
      stroke-width: 1.8;
    }

    .logo-title {
      font-family: 'Fraunces', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--brown-dark);
      text-align: center;
      line-height: 1.2;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    .logo-subtitle {
      font-size: 14px;
      color: var(--brown-light);
      text-align: center;
      margin-top: 8px;
      font-weight: 300;
      letter-spacing: 0.01em;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(196,149,106,0.3), transparent);
      margin-bottom: 36px;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
    }

    /* Form area */
    .form-group {
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--brown-mid);
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: var(--brown-light);
      fill: none;
      stroke-width: 1.8;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    .url-input {
      width: 100%;
      padding: 16px 16px 16px 46px;
      border: 1.5px solid rgba(196,149,106,0.3);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--brown-dark);
      background: var(--cream);
      outline: none;
      transition: all 0.25s ease;
    }

    .url-input::placeholder { color: rgba(107,62,38,0.35); }

    .url-input:focus {
      border-color: var(--brown-light);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(196,149,106,0.1);
    }

    .url-input:focus + svg,
    .input-wrapper:focus-within svg {
      stroke: var(--brown-mid);
    }

    .form-hint {
      font-size: 12px;
      color: var(--brown-light);
      margin-top: 8px;
      opacity: 0.8;
    }

    /* Error message */
    .error-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: 8px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      margin-top: 28px;
      padding: 17px;
      background: linear-gradient(135deg, var(--brown-mid) 0%, var(--brown-dark) 100%);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(44,24,16,0.25);
    }

    .btn-submit:hover::after { opacity: 1; }

    .btn-submit:active { transform: translateY(0); }

    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading state */
    .btn-submit .btn-text { transition: opacity 0.2s; }
    .btn-submit .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .btn-submit.loading .btn-text { opacity: 0; }
    .btn-submit.loading .btn-spinner { display: block; }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* Info badges */
    .badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 28px;
      flex-wrap: wrap;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      color: var(--brown-mid);
      background: rgba(196,149,106,0.12);
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 400;
    }

    /* ── CAFE LIST BUTTON ── */
    .btn-list {
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      background: transparent;
      color: var(--brown-mid);
      border: 1.5px dashed rgba(196,149,106,0.6);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-list:hover {
      background: rgba(196,149,106,0.08);
      border-color: var(--brown-light);
    }
    .btn-list svg {
      width: 16px; height: 16px;
      stroke: var(--brown-light); fill: none; stroke-width: 2;
    }

    /* ── POPUP OVERLAY ── */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,24,16,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .popup-overlay.show { display: flex; }

    .popup-box {
      background: var(--white);
      border-radius: 20px;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(44,24,16,0.25);
      animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1) both;
      margin: 16px;
    }

    .popup-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(196,149,106,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .popup-title {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      color: var(--brown-dark);
      font-weight: 700;
    }

    .popup-close {
      width: 32px; height: 32px;
      border: none; background: var(--cream);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .popup-close:hover { background: rgba(196,149,106,0.2); }
    .popup-close svg {
      width: 16px; height: 16px;
      stroke: var(--brown-mid); fill: none; stroke-width: 2;
    }

    .popup-search {
      padding: 12px 24px;
      flex-shrink: 0;
    }

    .popup-search input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid rgba(196,149,106,0.3);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      background: var(--cream);
      color: var(--brown-dark);
      outline: none;
    }
    .popup-search input:focus {
      border-color: var(--brown-light);
      background: var(--white);
    }

    .popup-list {
      overflow-y: auto;
      padding: 8px 16px 16px;
      flex: 1;
    }

    .cafe-item {
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(196,149,106,0.1);
    }
    .cafe-item:last-child { border-bottom: none; }
    .cafe-item:hover { background: var(--cream); }

    .cafe-item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--brown-dark);
    }
    .cafe-item-tags {
      font-size: 11px;
      color: var(--brown-light);
      margin-top: 3px;
    }

    .badge svg {
      width: 12px;
      height: 12px;
      stroke: var(--green);
      fill: none;
      stroke-width: 2.5;
      flex-shrink: 0;
    }

    .popup-loading {
      padding: 40px;
      text-align: center;
      color: var(--brown-light);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Decorative beans -->
  <div class="bean"></div>
  <div class="bean"></div>
  <div class="bean"></div>
  <div class="bean"></div>

  <div class="card">
    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">
        <!-- Coffee cup icon -->
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
      </div>
      <h1 class="logo-title">Deteksi Ulasan Kafe Jember</h1>
      <p class="logo-subtitle">Cari tahu ulasan asli dan temukan kafe terbaik di sekitar Anda</p>
    </div>

    <div class="divider"></div>

    <!-- Form -->
    <div class="form-group" id="urlGroup">
      <label class="form-label" for="cafeUrl">URL Google Maps Kafe</label>
      <div class="input-wrapper">
        <input
          type="text"
          id="cafeUrl"
          class="url-input"
          placeholder="https://maps.google.com/..."
          autocomplete="off"
          spellcheck="false"
        />
        <!-- Link icon -->
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </div>
      <p class="form-hint">Masukkan URL Google Maps untuk kafe yang ingin dianalisis</p>
      <p class="error-msg" id="errorMsg">⚠ URL tidak valid. Pastikan URL berasal dari Google Maps.</p>
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="handleSubmit()">
      <span class="btn-text">Lihat Ulasan Asli</span>
      <span class="btn-spinner"></span>
    </button>

    <!-- Tombol pilih dari daftar (hanya muncul di mode lokal) -->
    <button class="btn-list" id="btnList" onclick="openPopup()" style="display:none;">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Atau pilih dari daftar kafe
    </button>

    <!-- Badges -->
    <div class="badges">
      <span class="badge">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Deteksi AI
      </span>
      <span class="badge">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Ulasan Terverifikasi
      </span>
      <span class="badge">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Rekomendasi Kafe
      </span>
    </div>
  </div>

<!-- Popup daftar kafe -->
<div class="popup-overlay" id="popupOverlay" onclick="closePopupOutside(event)">
  <div class="popup-box">
    <div class="popup-header">
      <div class="popup-title">☕ Pilih Kafe</div>
      <button class="popup-close" onclick="closePopup()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="popup-search">
      <input type="text" id="searchKafe" placeholder="Cari nama kafe..." oninput="filterKafe(this.value)" autocomplete="off"/>
    </div>
    <div class="popup-list" id="popupList">
      <div class="popup-loading">Memuat daftar kafe...</div>
    </div>
  </div>
</div>

  <script>
    function isValidGoogleMapsUrl(url) {
      return url.includes('google.com/maps') || 
             url.includes('maps.google') || 
             url.includes('goo.gl/maps') ||
             url.includes('maps.app.goo.gl');
    }

    // ── Cek mode saat halaman dibuka ──────────────────────────
    let allCafes = [];

    async function initMode() {
      try {
        const res = await fetch('/mode');
        const { mode } = await res.json();
        if (mode === 'local') {
          // Sembunyikan input URL, tampilkan tombol list
          document.getElementById('urlGroup').style.display = 'none';
          document.getElementById('btnSubmit').style.display = 'none';
          document.getElementById('btnList').style.display = 'flex';
          loadCafes();
        }
        // mode === 'apify' → tampilan default (input URL)
      } catch (e) {
        console.warn('Gagal cek mode:', e);
      }
    }

    async function loadCafes() {
      try {
        const res  = await fetch('/cafes');
        const data = await res.json();
        allCafes = data.cafes;
      } catch (e) {
        console.warn('Gagal load cafes:', e);
      }
    }

    // ── Popup ──────────────────────────────────────────────────
    function openPopup() {
      document.getElementById('popupOverlay').classList.add('show');
      document.getElementById('searchKafe').value = '';
      renderKafe(allCafes);
      setTimeout(() => document.getElementById('searchKafe').focus(), 100);
    }

    function closePopup() {
      document.getElementById('popupOverlay').classList.remove('show');
    }

    function closePopupOutside(e) {
      if (e.target === document.getElementById('popupOverlay')) closePopup();
    }

    function filterKafe(query) {
      const q = query.toLowerCase();
      const filtered = allCafes.filter(c => c.name.toLowerCase().includes(q));
      renderKafe(filtered);
    }

    function renderKafe(list) {
      const el = document.getElementById('popupList');
      if (!list.length) {
        el.innerHTML = '<div class="popup-loading">Kafe tidak ditemukan.</div>';
        return;
      }
      el.innerHTML = list.map(c => `
        <div class="cafe-item" onclick="pilihKafe('${c.url.replace(/'/g,"\\'")}', '${c.name.replace(/'/g,"\\'")}')">
          <div class="cafe-item-name">${c.name}</div>
          <div class="cafe-item-tags">${c.labels.join(' · ') || ''}</div>
        </div>
      `).join('');
    }

    async function pilihKafe(url, name) {
      closePopup();

      const btn = document.getElementById('btnList');
      btn.disabled = true;
      btn.innerHTML = `<span style="opacity:0.6">Menganalisis ${name}...</span>`;

      try {
        const response = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || 'Terjadi kesalahan pada server');
        }

        const data = await response.json();
        sessionStorage.setItem('cafeUrl', url);
        sessionStorage.setItem('analyzeResult', JSON.stringify(data));
        sessionStorage.setItem('resultFrom', 'index');
        window.location.href = '/results.html';

      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg> Atau pilih dari daftar kafe`;
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = `⚠ ${err.message}`;
        errorMsg.classList.add('show');
      }
    }

    // Tutup popup dengan Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePopup();
    });

    // Reset tombol list saat kembali ke halaman ini
    window.addEventListener('pageshow', () => {
      const btn = document.getElementById('btnList');
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--brown-light);fill:none;stroke-width:2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> Atau pilih dari daftar kafe`;
      }
    });

    // Jalankan cek mode saat halaman dibuka
    initMode();

    async function handleSubmit() {
      const input = document.getElementById('cafeUrl');
      const btn = document.getElementById('btnSubmit');
      const errorMsg = document.getElementById('errorMsg');
      const url = input.value.trim();

      // Reset error
      errorMsg.classList.remove('show');
      input.style.borderColor = '';

      // Validasi
      if (!url) {
        errorMsg.textContent = '⚠ URL tidak boleh kosong.';
        errorMsg.classList.add('show');
        input.focus();
        return;
      }

      if (!isValidGoogleMapsUrl(url)) {
        errorMsg.textContent = '⚠ URL tidak valid. Pastikan URL berasal dari Google Maps.';
        errorMsg.classList.add('show');
        input.style.borderColor = '#c0392b';
        return;
      }

      // Loading state
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        // Kirim URL ke backend FastAPI
        const response = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || 'Terjadi kesalahan pada server');
        }

        const data = await response.json();

        // Simpan hasil ke sessionStorage untuk dipakai di results.html
        sessionStorage.setItem('cafeUrl', url);
        sessionStorage.setItem('analyzeResult', JSON.stringify(data));
        sessionStorage.setItem('resultFrom', 'index');

        window.location.href = 'results.html';

      } catch (err) {
        btn.classList.remove('loading');
        btn.disabled = false;
        errorMsg.textContent = `⚠ ${err.message}`;
        errorMsg.classList.add('show');
      }
    }

    // Tekan Enter juga bisa submit
    document.getElementById('cafeUrl').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>

</body>
</html>
